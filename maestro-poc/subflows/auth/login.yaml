# Reusable authentication subflow to execute login steps
# Parameters required: USERNAME, PASSWORD
appId: ${APP_ID}
---
- runFlow: ../common/dismiss_popups.yaml
- tapOn: "Company Id"
- inputText: ${USERNAME}
- tapOn: "Password"
- inputText: ${PASSWORD}
- hideKeyboard
- tapOn: "LOGIN"
- assertVisible: "Dashboard"
