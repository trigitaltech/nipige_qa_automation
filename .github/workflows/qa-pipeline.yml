name: QA Automation Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-all-tests:
    name: Run All Tests
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            make \
            gcc \
            g++ \
            python3 \
            pkg-config \
            libpixman-1-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev

      - name: Install project dependencies
        run: npm ci || npm install

      - name: Verify Playwright installation
        run: |
          npx playwright --version
          node --version
          npm --version

      - name: Install Playwright browsers
        run: |
          npx playwright install chromium --with-deps

      - name: Create .env file for CI
        run: |
          cp .env.example .env
          sed -i 's|BASE_URL=http://advantageonlineshopping.com|BASE_URL=https://migration.demn8gjs27bhv.amplifyapp.com/|g' .env

      - name: Verify environment
        run: |
          echo "Checking environment..."

          if [ ! -f .env ]; then
            echo "WARNING: .env not found"
            ls -la
          else
            echo ".env found"
            grep "^BASE_URL" .env || true
          fi

      - name: Patch Playwright config for CI
        run: |
          sed -i 's/headless: false/headless: true/g' playwright.config.ts || true
          sed -i 's/"--start-maximized"/"--window-size=1920,1080"/g' playwright.config.ts || true
          sed -i 's/viewport: null/viewport: { width: 1920, height: 1080 }/g' playwright.config.ts || true

      - name: Run Playwright tests
        run: |
          npm run test:regression

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: |
            playwright-report
            test-results
          retention-days: 14

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-logs
          path: |
            logs
            test-results
          retention-days: 14

      - name: Upload Failure Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-artifacts
          path: |
            test-results
            playwright-report
          retention-days: 7


