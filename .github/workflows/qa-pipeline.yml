name: QA Automation Pipeline

on:
  workflow_dispatch:

jobs:
  run-all-tests:
    name: Run All Tests
    runs-on: ubuntu-latest
    timeout-minutes: 150  # Increased from 90 to 150 minutes to allow all tests to complete
    env:
      TEST_TIMEOUT: 15  # 15 minutes per test (increased from 5 for complex UI scenarios)
      ACTION_TIMEOUT: 60  # 60 seconds per action (increased from 2 to handle slow UI)
      NAVIGATION_TIMEOUT: 45  # 45 seconds for page navigation (increased from 1)
      RETRIES: 2  # Keep 2 retries for flaky tests (was 1, reverting to handle flakiness)
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            make \
            gcc \
            g++ \
            python3 \
            pkg-config \
            libpixman-1-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev

      - name: Install project dependencies
        run: npm ci || npm install

      - name: Verify Playwright installation
        id: playwright-version
        run: |
          npx playwright --version
          node --version
          npm --version
          echo "version=$(npx playwright --version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Create .env file for CI
        run: |
          cp .env.example .env
          sed -i 's|BASE_URL=http://advantageonlineshopping.com|BASE_URL=https://migration.demn8gjs27bhv.amplifyapp.com/|g' .env

      - name: Add rate limiting and timeout handling
        run: |
          cat >> .env << EOF
          RATE_LIMIT_DELAY=2000
          API_REQUEST_RETRY=3
          API_REQUEST_DELAY=1000
          # Increase timeouts for CI environment
          ACTION_TIMEOUT=60
          NAVIGATION_TIMEOUT=45
          TEST_TIMEOUT=15
          EOF

      - name: Verify environment
        run: |
          echo "Checking environment..."

          if [ ! -f .env ]; then
            echo "ERROR: .env not found"
            ls -la
            exit 1
          else
            echo "✅ .env found"
            grep "^BASE_URL" .env || true
            grep "^ACTION_TIMEOUT" .env || true
          fi

      - name: Run Playwright tests with detailed logging
        run: npm run test:regression -- --workers=6 --retries=2 --reporter=list
        continue-on-error: true  # Allow test failures to generate reports

      - name: Kill hanging processes
        if: always()
        run: |
          pkill -f playwright || true
          pkill -f chromium || true

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: |
            playwright-report
            test-results
          retention-days: 14

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-logs
          path: |
            logs
            test-results
          retention-days: 14

      - name: Upload Failure Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-artifacts
          path: |
            test-results
            playwright-report
          retention-days: 7

      - name: Test Summary
        if: always()
        run: |
          echo "=========================================="
          echo "Test Execution Completed"
          echo "=========================================="
          echo "Configuration:"
          echo "  - ACTION_TIMEOUT: 60 seconds"
          echo "  - NAVIGATION_TIMEOUT: 45 seconds"
          echo "  - TEST_TIMEOUT: 15 minutes"
          echo "  - RETRIES: 2 attempts per test"
          echo "  - WORKERS: 6 parallel"
          echo "=========================================="
